<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊見證 - 吃喝玩樂營</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .testimonial-grid { display: grid; gap: 20px; margin-top: 30px; }
        .card { background: #f9f9f9; padding: 20px; border-radius: 10px; border-left: 5px solid #ff9800; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stars { color: #f1c40f; font-size: 1.2em; margin-bottom: 10px; }
        .user-info { font-weight: bold; display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 50px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #ff9800; color: white; }
    </style>
</head>
<body>
    
    <script src ="nav_bar.js" ></script>
    <div id="nav_bar"></div>

    <section class="container">
        <h2>🌍 旅客見證牆</h2>
        <p>看看參加過「吃喝玩樂營」的夥伴們怎麼說！</p>
        
        <table>
            <thead>
                <tr>
                    <th>旅客</th>
                    <th>參加行程</th>
                    <th>自行規劃估價</th>
                    <th>團體優惠價</th>
                    <th>節省金額</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>小明</td><td>日本東京 7 日</td><td>$78,000</td><td>$68,000</td><td style="color:green; font-weight:bold;">-$10,000</td></tr>
                <tr><td>王小姐</td><td>韓國首爾 7 日</td><td>$145,000</td><td>$125,888</td><td style="color:green; font-weight:bold;">-$19,112</td></tr>
            </tbody>
        </table>

        <h3>⭐ 真心推薦評價</h3>
        <div class="testimonial-grid">
            <div class="card">
                <div class="stars">★★★★★</div>
                <p>「原本以為去四川會很麻煩，結果吃喝玩樂營安排得超好！熊貓基地完全不用排隊太久。」</p>
                <div class="user-info"><span>台中 - 陳大哥</span></div>
            </div>
            <div class="card">
                <div class="stars">★★★★★</div>
                <p>「東京晴空塔的門票都幫我們預約好了，導遊非常專業，推薦給想要懶人旅遊的人！」</p>
                <div class="user-info"><span>台北 - 小明</span></div>
            </div>
        </div>

        <div style="height: 100px;"></div>
    </section>

    <!-- 右側漂浮廣告 -->
     <div style="position:fixed; right:10px; top:100px; z-index: 999;">
        <a href="https://travel4u.com.tw" target="_blank">
            <img src="https://image1.gamme.com.tw/news2/2014/48/05/p6CVpaaVmKSZ.jpg" alt="精選廣告" style="width: 200px; height: auto; border-radius: 8px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2);">
        </a>
    </div>

</body>
</html>
